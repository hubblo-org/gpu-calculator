name: unit and integration testing

on:
  push:
    branches: main
    paths-ignore:
      - "docs/**"
      - "README.md"
  pull_request:
    branches: [main, dev]
    paths-ignore:
      - "docs/**"
      - "README.md"

jobs:
  test:
    name: test_gpu_calculator    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: v24.14.0
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm run test
